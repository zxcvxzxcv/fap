<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR COLLECTION</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#000; --surface:#080808; --card:#0d0d0d; --card2:#111;
  --border:#1a1a1a; --border2:#242424;
  --pink:#ff1f6e; --pink2:#ff5592; --pink-dim:rgba(255,31,110,.1); --pink-glow:rgba(255,31,110,.3);
  --gold:#c89218; --silver:#6a6a6a; --bronze:#7a4820;
  --text:#efefef; --muted:#444; --muted2:#222;
  --sidebar-w:220px;
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 50% 60% at 100% 0%,rgba(255,31,110,.06) 0%,transparent 60%),radial-gradient(ellipse 30% 40% at 0% 100%,rgba(255,31,110,.04) 0%,transparent 50%); pointer-events:none; z-index:0; }

/* SIDEBAR */
.sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); height:100vh; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; left:0; top:0; z-index:100; }
.sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid var(--border); }
.sidebar-logo h1 { font-family:'Black Han Sans',sans-serif; font-size:14px; letter-spacing:4px; color:var(--pink); text-transform:uppercase; }
.sidebar-logo p { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:2px; margin-top:6px; }
.sidebar-stats { padding:16px 20px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:8px 10px; }
.stat-box .sv { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--pink); line-height:1; }
.stat-box .sl { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:1px; margin-top:3px; text-transform:uppercase; }
.sidebar-nav { flex:1; padding:12px; display:flex; flex-direction:column; gap:2px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:7px; border:none; background:transparent; color:var(--muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; transition:all .2s; width:100%; text-align:left; }
.nav-item:hover { color:var(--text); background:rgba(255,255,255,.03); }
.nav-item.active { color:var(--pink); background:var(--pink-dim); }
.nav-item .ni { width:16px; height:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.nav-sep { height:1px; background:var(--border); margin:6px 0; }
.sidebar-bottom { padding:16px 14px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
.btn-add-main { width:100%; padding:10px; background:var(--pink); color:#fff; border:none; border-radius:7px; font-family:'Black Han Sans',sans-serif; font-size:14px; letter-spacing:2px; cursor:pointer; transition:all .2s; }
.btn-add-main:hover { background:var(--pink2); box-shadow:0 0 20px var(--pink-glow); }
.btn-group-mgr { width:100%; padding:8px; background:transparent; color:var(--muted); border:1px solid var(--border2); border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.btn-group-mgr:hover { border-color:var(--pink); color:var(--pink); }

/* SYNC STATUS */
.sync-bar { padding:8px 14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted2); flex-shrink:0; transition:background .3s; }
.sync-dot.ok { background:#22c55e; }
.sync-dot.syncing { background:var(--pink); animation:pulse .8s infinite; }
.sync-dot.err { background:#ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.sync-lbl { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; }

/* MAIN */
.main { margin-left:var(--sidebar-w); flex:1; height:100vh; overflow-y:auto; position:relative; z-index:1; }
.topbar { position:sticky; top:0; z-index:50; background:rgba(0,0,0,.94); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 32px; height:52px; display:flex; align-items:center; gap:12px; }
.topbar-title { font-family:'Black Han Sans',sans-serif; font-size:13px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-right:12px; white-space:nowrap; }
.topbar-title span { color:var(--pink); }
.search-wrap { flex:1; max-width:420px; position:relative; }
.search-wrap input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:7px; padding:8px 14px 8px 34px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; transition:border-color .2s; }
.search-wrap input:focus { border-color:var(--pink); }
.search-wrap input::placeholder { color:var(--muted); }
.search-wrap .s-ic { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); }
.topbar-filters { display:flex; gap:8px; margin-left:auto; }
.tb-select { background:var(--card); border:1px solid var(--border); border-radius:7px; padding:7px 12px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.5px; outline:none; cursor:pointer; }
.tb-select option { background:var(--surface); }

/* PAGES */
.page { display:none; padding:28px 32px 60px; }
.page.active { display:block; }

/* CAT STRIP */
.cat-strip { display:flex; gap:6px; margin-bottom:22px; }
.cat-btn { padding:5px 18px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; transition:all .2s; }
.cat-btn:hover { border-color:var(--pink); color:var(--pink); }
.cat-btn.active { background:var(--pink); border-color:var(--pink); color:#fff; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:all .22s; position:relative; animation:fadeUp .28s ease both; cursor:default; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.card:hover { transform:translateY(-4px); border-color:rgba(255,31,110,.25); box-shadow:0 10px 36px rgba(0,0,0,.7); }
.rank-stripe { position:absolute; top:0; left:0; width:3px; height:100%; z-index:1; }
.card-img-wrap { position:relative; }
.card-img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:var(--surface); }
.card-img-ph { width:100%; aspect-ratio:3/4; background:linear-gradient(160deg,#0f0f0f 0%,#080808 100%); display:flex; align-items:center; justify-content:center; }
.card-img-ph svg { width:52px; height:52px; stroke:#1e1e1e; fill:none; }
.card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 50%); opacity:0; transition:opacity .2s; display:flex; align-items:flex-end; padding:12px; gap:6px; }
.card:hover .card-overlay { opacity:1; }
.btn-ov { padding:6px 12px; border-radius:5px; border:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; transition:all .15s; }
.btn-ov:hover { transform:scale(1.05); }
.btn-ov-log { background:var(--pink); color:#fff; }
.btn-ov-edit { background:rgba(255,255,255,.1); color:#ccc; }
.btn-ov-del { background:rgba(255,31,110,.15); color:var(--pink); }
.card-body { padding:11px 13px 13px; }
.card-name { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
.card-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.cat-badge { font-size:9px; padding:2px 7px; border-radius:3px; font-weight:700; letter-spacing:1px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; }
.cb-cel { background:rgba(255,31,110,.14); color:var(--pink); }
.cb-fam { background:rgba(255,255,255,.06); color:#777; }
.cb-bj  { background:rgba(255,31,110,.07); color:#ff7aaa; }
.grp-badge { font-size:9px; padding:2px 7px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-weight:600; letter-spacing:.5px; }
.card-count { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-top:5px; letter-spacing:.5px; }
.card-count b { color:var(--pink); }
.card-note { font-size:11px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.empty { grid-column:1/-1; text-align:center; padding:100px 20px; }
.empty-line { width:28px; height:1px; background:var(--border2); margin:12px auto; }
.empty p { font-size:11px; color:var(--muted2); font-family:'JetBrains Mono',monospace; letter-spacing:1px; line-height:2.2; }

/* RANKING */
.ranking-page-wrap { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
.ranking-main { display:flex; flex-direction:column; gap:20px; }
.rank-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.rank-panel-hd { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.rank-panel-hd h3 { font-family:'Black Han Sans',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; }
.rank-panel-hd .sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; }
.rank-list { padding:4px 0; }
.rank-row { display:flex; align-items:center; gap:12px; padding:10px 18px 14px; position:relative; transition:background .18s; }
.rank-row:hover { background:rgba(255,255,255,.012); }
.rank-num { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; width:22px; text-align:center; flex-shrink:0; }
.rg1{color:var(--gold)} .rg2{color:var(--silver)} .rg3{color:var(--bronze)}
.rank-thumb { width:36px; height:36px; border-radius:50%; background:var(--surface); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.rank-thumb img { width:100%; height:100%; object-fit:cover; }
.rank-thumb svg { width:16px; height:16px; stroke:#222; fill:none; }
.rank-info { flex:1; min-width:0; }
.rank-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-sub { font-size:10px; color:var(--muted); margin-top:1px; font-family:'JetBrains Mono',monospace; }
.rank-bar-bg { position:absolute; bottom:0; left:60px; right:16px; height:1px; background:var(--border); }
.rank-bar-fill { height:100%; background:linear-gradient(90deg,var(--pink),var(--pink2)); transition:width .7s ease; }
.rank-count { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--pink); flex-shrink:0; }
.rank-cat-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
.grp-row { display:flex; align-items:center; gap:10px; padding:11px 18px; border-bottom:1px solid var(--border); }
.grp-row:last-child { border-bottom:none; }
.grp-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.grp-info { flex:1; min-width:0; }
.grp-name2 { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.grp-meta2 { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:2px; }
.grp-bar-bg { height:2px; background:var(--border); border-radius:1px; margin-top:5px; }
.grp-bar-fill2 { height:100%; border-radius:1px; transition:width .7s; }
.grp-cnt { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--pink); flex-shrink:0; }
.no-data { padding:20px; text-align:center; color:var(--muted2); font-size:10px; font-family:'JetBrains Mono',monospace; letter-spacing:2px; }

/* HEATMAP */
.heatmap-page-wrap { display:grid; grid-template-columns:1fr 360px; gap:20px; align-items:start; }
.hm-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px; overflow-x:auto; }
.hm-top { display:flex; align-items:center; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
.hm-title { font-family:'Black Han Sans',sans-serif; font-size:12px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; flex:1; }
.hm-title b { color:var(--pink); }
.hm-sel { background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:7px 14px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; min-width:160px; }
.btn-lognow { padding:7px 18px; background:var(--pink); color:#fff; border:none; border-radius:6px; font-family:'Black Han Sans',sans-serif; font-size:13px; letter-spacing:1px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.btn-lognow:hover { background:var(--pink2); box-shadow:0 0 14px var(--pink-glow); }
.btn-clr { padding:7px 12px; background:transparent; border:1px solid var(--border2); color:var(--muted); border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; }
.btn-clr:hover { border-color:var(--pink); color:var(--pink); }
.hm-grid { display:grid; grid-template-columns:38px repeat(24,1fr); gap:4px; min-width:620px; }
.hm-corner { width:38px; }
.hm-hour { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted2); text-align:center; padding-bottom:4px; }
.hm-day-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); display:flex; align-items:center; }
.hm-cell { aspect-ratio:1; border-radius:3px; cursor:pointer; transition:transform .1s; }
.hm-cell:hover { transform:scale(1.3); z-index:5; }
.hm-cell[data-v="0"]{background:#0d0d0d} .hm-cell[data-v="1"]{background:rgba(255,31,110,.18)} .hm-cell[data-v="2"]{background:rgba(255,31,110,.38)} .hm-cell[data-v="3"]{background:rgba(255,31,110,.58)} .hm-cell[data-v="4"]{background:rgba(255,31,110,.78)} .hm-cell[data-v="5"]{background:var(--pink);box-shadow:0 0 5px var(--pink-glow)}
.hm-peak { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-top:14px; line-height:2; }
.hm-peak b { color:var(--text); }
.hm-peak .pk { color:var(--pink); }
.log-side-panel { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; max-height:600px; display:flex; flex-direction:column; }
.log-side-hd { padding:13px 18px; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; flex-shrink:0; }
.log-side-list { overflow-y:auto; flex:1; }
.log-row { display:flex; align-items:center; gap:10px; padding:8px 16px; border-bottom:1px solid rgba(255,255,255,.022); }
.log-row:last-child { border-bottom:none; }
.log-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); flex-shrink:0; width:120px; }
.log-pname { font-size:13px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.log-pcat { font-size:9px; color:var(--muted); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
.log-del-btn { background:transparent; border:none; color:var(--muted2); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 5px; transition:color .2s; flex-shrink:0; }
.log-del-btn:hover { color:var(--pink); }

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.88); backdrop-filter:blur(14px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--card2); border:1px solid var(--border2); border-radius:14px; width:100%; max-width:480px; padding:28px; transform:translateY(12px) scale(.97); transition:transform .25s; max-height:90vh; overflow-y:auto; }
.overlay.open .modal { transform:translateY(0) scale(1); }
.modal h2 { font-family:'Black Han Sans',sans-serif; font-size:15px; letter-spacing:3px; color:var(--pink); margin-bottom:22px; text-transform:uppercase; }
.fg { margin-bottom:13px; }
.fg label { display:block; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; font-family:'JetBrains Mono',monospace; }
.fg input,.fg textarea,.fg select { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:7px; padding:9px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; transition:border-color .2s; }
.fg input:focus,.fg textarea:focus,.fg select:focus { border-color:var(--pink); }
.fg textarea { resize:vertical; min-height:58px; }
.fg select option { background:var(--surface); }
.drop-zone { border:1px dashed var(--border2); border-radius:9px; padding:22px; text-align:center; cursor:pointer; transition:all .2s; position:relative; background:var(--surface); }
.drop-zone:hover,.drop-zone.drag { border-color:var(--pink); background:var(--pink-dim); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.dz-icon { margin:0 auto 8px; display:block; stroke:var(--muted); fill:none; }
.dz-text { font-size:12px; color:var(--muted); line-height:1.7; }
.dz-text b { color:var(--pink); }
.preview-img { width:100%; max-height:160px; object-fit:cover; border-radius:7px; margin-top:10px; display:none; }
.modal-footer { display:flex; gap:8px; margin-top:20px; }
.btn-cancel { flex:1; padding:10px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:13px; transition:all .2s; }
.btn-cancel:hover { color:var(--text); border-color:var(--border2); }
.btn-save { flex:2; padding:10px; background:var(--pink); border:none; border-radius:7px; color:#fff; cursor:pointer; font-family:'Black Han Sans',sans-serif; font-size:15px; letter-spacing:1px; transition:all .2s; }
.btn-save:hover { background:var(--pink2); box-shadow:0 0 14px var(--pink-glow); }
.grp-list-wrap { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; max-height:220px; overflow-y:auto; }
.grp-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:7px; }
.grp-color-pick { width:20px; height:20px; border-radius:50%; border:none; cursor:pointer; flex-shrink:0; }
.grp-name-input { flex:1; background:transparent; border:none; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; }
.btn-grp-del { background:transparent; border:none; color:var(--muted2); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:11px; padding:2px 4px; transition:color .2s; }
.btn-grp-del:hover { color:var(--pink); }
.btn-grp-add { padding:8px 14px; background:transparent; border:1px dashed var(--border2); border-radius:7px; color:var(--pink); font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; width:100%; transition:all .2s; }
.btn-grp-add:hover { border-color:var(--pink); background:var(--pink-dim); }
.toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--card2); border:1px solid var(--border2); border-radius:6px; padding:9px 22px; font-size:11px; font-family:'JetBrains Mono',monospace; letter-spacing:.5px; z-index:999; transition:transform .3s; white-space:nowrap; color:var(--text); }
.toast.show { transform:translateX(-50%) translateY(0); }
.tp { color:var(--pink); }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#1e1e1e; border-radius:2px; }

/* MOBILE VIEW */
body.mobile-view { font-size:14px; }
body.mobile-view .sidebar { display:none; }
body.mobile-view .main { margin-left:0; }
body.mobile-view .grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
body.mobile-view .page { padding:16px 14px 60px; }
body.mobile-view .topbar { padding:0 14px; gap:8px; }
body.mobile-view .topbar-title { display:none; }
body.mobile-view .search-wrap { max-width:100%; }
body.mobile-view .topbar-filters { display:none !important; }
body.mobile-view .ranking-page-wrap { grid-template-columns:1fr; }
body.mobile-view .rank-cat-grid { grid-template-columns:1fr; }
body.mobile-view .heatmap-page-wrap { grid-template-columns:1fr; }
body.mobile-view .hm-panel { padding:14px 10px; }

/* MOBILE BOTTOM NAV */
.mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,.96); border-top:1px solid #1a1a1a; z-index:100; height:56px; align-items:center; justify-content:space-around; }
body.mobile-view .mobile-nav { display:flex; }
body.mobile-view .main { padding-bottom:56px; }

/* 캘린더 */

.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-month { font-family:'Black Han Sans',sans-serif; font-size:14px; letter-spacing:2px; color:var(--text); }
.cal-nav { background:transparent; border:1px solid var(--border2); color:var(--muted); border-radius:5px; padding:5px 12px; cursor:pointer; font-size:14px; transition:all .2s; }
.cal-nav:hover { border-color:var(--pink); color:var(--pink); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dow { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); text-align:center; padding:4px 0 8px; letter-spacing:1px; }
.cal-cell { min-height:52px; border-radius:6px; background:var(--surface); border:1px solid transparent; cursor:pointer; padding:5px 7px; transition:all .18s; position:relative; }

.cal-cell.today .cal-day { color:var(--pink); font-weight:700; }
.cal-day { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }
.cal-dots { display:flex; flex-wrap:wrap; gap:2px; margin-top:4px; }
.cal-dot { width:5px; height:5px; border-radius:50%; background:var(--pink); opacity:.7; }

<script>
// ═══════════════════════════════
//  SUPABASE CONFIG
// ═══════════════════════════════
const SB_URL = "https://vdxzekdhcuabqyimwewg.supabase.co";
const SB_KEY = "sb_publishable_47gE09l4GYC9uG2euG4w1w_Re8eyDB5";
const HEADERS = {
  "Content-Type": "application/json",
  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY,
  "Prefer": "return=representation"
};

async function sbGet(table, query="") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST", headers: HEADERS, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, data) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "PATCH", headers: HEADERS, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: "DELETE", headers: HEADERS
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbDeleteWhere(table, col, val) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${val}`, {
    method: "DELETE", headers: HEADERS
  });
  if (!r.ok) throw new Error(await r.text());
}

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let items = [], groups = [], logs = [];
let editId = null, currentImg = null, currentImgFile = null, currentCat = "전체";

const DAYS    = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAYS_KR = ["월","화","수","목","금","토","일"];
const PSV = `<svg width="52" height="52" fill="none" stroke="#1c1c1c" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`;
const PSM = `<svg width="16" height="16" fill="none" stroke="#222" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`;
const TB_TITLES = { cards:"<span>01</span> CARDS", ranking:"<span>02</span> RANKING", heatmap:"<span>03</span> LOG" };

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pad(n){return String(n).padStart(2,"0");}
function catCls(c){return c==="연예인"?"cb-cel":c==="유명인"?"cb-fam":"cb-bj";}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getCount(id){return logs.filter(l=>l.pid===id).length;}

// SYNC STATUS
function setSyncStatus(state, msg) {
  const dot = document.getElementById("sync-dot");
  const lbl = document.getElementById("sync-lbl");
  dot.className = "sync-dot " + state;
  lbl.textContent = msg;
}

// ═══════════════════════════════
//  LOAD ALL DATA
// ═══════════════════════════════
async function loadAll() {
  setSyncStatus("syncing", "LOADING...");
  try {
    [items, groups, logs] = await Promise.all([
      sbGet("star_items", "order=created_at.desc"),
      sbGet("star_groups", ""),
      sbGet("star_logs", "order=ts.desc")
    ]);
    setSyncStatus("ok", "SYNCED");
    renderCards();
    updateStats();
  } catch(e) {
    setSyncStatus("err", "ERROR");
    showToast("로드 실패: " + e.message);
  }
}

// ═══════════════════════════════
//  PAGE NAV
// ═══════════════════════════════
document.querySelectorAll(".nav-item").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const pg = t.dataset.page;
    document.getElementById("page-"+pg).classList.add("active");
    document.getElementById("tb-title").innerHTML = TB_TITLES[pg];
    document.querySelector(".search-wrap").style.display = pg==="cards"?"":"none";
    document.querySelector(".topbar-filters").style.display = pg==="cards"?"":"none";
    if(pg==="ranking") renderRanking();
    if(pg==="heatmap") renderHeatmapPage();
  });
});

// ═══════════════════════════════
//  CARDS
// ═══════════════════════════════
function renderCards() {
  const q = document.getElementById("search-input").value.trim().toLowerCase();
  const fCat = document.getElementById("filter-cat").value;
  const fg = document.getElementById("filter-grp");
  const fgVal = fg.value;
  fg.innerHTML = "<option value=''>ALL GROUP</option>" +
    groups.map(g=>`<option value="${g.id}" ${fgVal===g.id?"selected":""}>${esc(g.name)}</option>`).join("");

  let list = [...items].sort((a,b)=>getCount(b.id)-getCount(a.id));
  if(currentCat!=="전체") list=list.filter(i=>i.cat===currentCat);
  if(fCat) list=list.filter(i=>i.cat===fCat);
  const fGrp = fg.value;
  if(fGrp) list=list.filter(i=>i.gid===fGrp);
  if(q) list=list.filter(i=>
    i.name.toLowerCase().includes(q)||
    (i.note||"").toLowerCase().includes(q)||
    (groups.find(g=>g.id===i.gid)?.name||"").toLowerCase().includes(q));

  const grid = document.getElementById("grid");
  if(!list.length){
    grid.innerHTML=`<div class="empty"><div class="empty-line"></div><p>등록된 인물이 없습니다<br>+ ADD 버튼으로 추가하세요</p><div class="empty-line"></div></div>`;
    return;
  }
  grid.innerHTML = list.map((item,idx)=>{
    const cnt = getCount(item.id);

async function quickLog(pid, e) {
  e&&e.stopPropagation();
  const id = genId();
  const ts = new Date().toISOString();
  const entry = { id, pid, ts };
  logs.unshift(entry);
  renderCards();
  const item = items.find(i=>i.id===pid);
  showToast(`<span class="tp">+</span> ${item?.name||""} 기록`);
  setSyncStatus("syncing","SAVING...");
  try {
    await sbInsert("star_logs", entry);
    setSyncStatus("ok","SYNCED");
  } catch(err) {
    logs = logs.filter(l=>l.id!==id);
    renderCards();
    setSyncStatus("err","ERROR");
    showToast("저장 실패: "+err.message);
  }
}

//  SAVE / EDIT / DELETE
// ═══════════════════════════════
async function saveItem() {
  const name = document.getElementById("f-name").value.trim();
  const cat  = document.getElementById("f-cat").value;
  const gid  = document.getElementById("f-grp").value;
  const note = document.getElementById("f-note").value.trim();
  if(!name){showToast("이름을 입력하세요");return;}

  setSyncStatus("syncing","UPLOADING...");
  try {
    if(editId) {
      let imgUrl = items.find(i=>i.id===editId)?.img || null;
      // 새 이미지 파일이 있으면 Storage에 업로드
      if(currentImgFile) {
        imgUrl = await uploadImageToStorage(currentImgFile, editId);
      }
      const data = { name, cat, gid, note, img: imgUrl };
      await sbUpdate("star_items", editId, data);
      const idx = items.findIndex(i=>i.id===editId);
      if(idx!==-1) items[idx] = {...items[idx], ...data};
      showToast("<span class=tp>OK</span> 수정 완료");
    } else {
      const id = genId();
      let imgUrl = null;
      // 이미지 파일이 있으면 Storage에 업로드
      if(currentImgFile) {
        setSyncStatus("syncing","UPLOADING...");
        imgUrl = await uploadImageToStorage(currentImgFile, id);
      }
      const entry = { id, name, cat, gid, note, img: imgUrl };
      await sbInsert("star_items", entry);
      items.unshift(entry);
      showToast("<span class=tp>+</span> 추가 완료");
    }
    setSyncStatus("ok","SYNCED");
    closeModal(); renderCards();
  } catch(err) {
    setSyncStatus("err","ERROR");
    showToast("저장 실패: "+err.message);
  }
}

async function editItem(id, e) {
  e&&e.stopPropagation();
  const item = items.find(i=>i.id===id);
  if(!item) return;
  editId=id; currentImg=item.img||null; currentImgFile=null;
  document.getElementById("modal-title").textContent="EDIT ENTRY";
  document.getElementById("f-name").value=item.name;
  document.getElementById("f-cat").value=item.cat;
  document.getElementById("f-note").value=item.note||"";
  populateGrpSelect(item.gid);
  const p=document.getElementById("preview-img");
  if(item.img){p.src=item.img;p.style.display="block";}else{p.style.display="none";}
  openModal(true);
}

async function deleteItem(id, e) {
  e&&e.stopPropagation();
  if(!confirm("삭제하시겠습니까?")) return;
  setSyncStatus("syncing","DELETING...");
  try {
    await sbDelete("star_items", id);
    // Storage 이미지도 삭제
    await deleteImageFromStorage(id);
    items = items.filter(i=>i.id!==id);
    logs  = logs.filter(l=>l.pid!==id);
    renderCards(); setSyncStatus("ok","SYNCED"); showToast("삭제됨");
  } catch(err) {
    setSyncStatus("err","ERROR"); showToast("삭제 실패: "+err.message);
  }
}

function renderRanking() {
  const sorted = [...items].sort((a,b)=>getCount(b.id)-getCount(a.id));
  const maxC = Math.max(1,...sorted.map(i=>getCount(i.id)));
  document.getElementById("rank-total-lbl").textContent=`TOTAL ${logs.length}`;

  function makeList(list,m) {
    if(!list.length) return`<div class="no-data">NO DATA</div>`;
    const mx=m||Math.max(1,...list.map(i=>getCount(i.id)));
    return list.slice(0,10).map((item,idx)=>{
      const cnt=getCount(item.id); const pct=Math.round(cnt/mx*100);
      const cls=idx===0?"rg1":idx===1?"rg2":idx===2?"rg3":"";
      const grp=groups.find(g=>g.id===item.gid);
      return`<div class="rank-row">
        <div class="rank-num ${cls}">${pad(idx+1)}</div>
        <div class="rank-thumb">${item.img?`<img src="${item.img}" alt="">`:PSM}</div>
        <div class="rank-info">
          <div class="rank-name">${esc(item.name)}</div>
          <div class="rank-sub">${item.cat}${grp?` / ${esc(grp.name)}`:""}</div>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="rank-count">${cnt}</div>
      </div>`;
    }).join("");
  }
  document.getElementById("rank-person-list").innerHTML=makeList(sorted,maxC);
  document.getElementById("rank-cel").innerHTML=makeList(sorted.filter(i=>i.cat==="연예인"));
  document.getElementById("rank-fam").innerHTML=makeList(sorted.filter(i=>i.cat==="유명인"));
  document.getElementById("rank-bj").innerHTML=makeList(sorted.filter(i=>i.cat==="BJ"));

  const grpData = groups.map(g=>{
    const ms=items.filter(i=>i.gid===g.id);
    const cnt=ms.reduce((a,m)=>a+getCount(m.id),0);
    return{...g,cnt,members:ms.length};
  }).sort((a,b)=>b.cnt-a.cnt);
  const maxGC=Math.max(1,...grpData.map(g=>g.cnt));
  document.getElementById("rank-group-list").innerHTML=!grpData.length
    ?`<div class="no-data">NO GROUPS</div>`
    :grpData.map((g,i)=>`<div class="grp-row">
    <div class="rank-num ${i<3?["rg1","rg2","rg3"][i]:""}">${pad(i+1)}</div>
    <div class="grp-dot" style="background:${g.color}"></div>
    <div class="grp-info">
      <div class="grp-name2">${esc(g.name)}</div>
      <div class="grp-meta2">${g.members}명</div>
      <div class="grp-bar-bg"><div class="grp-bar-fill2" style="background:${g.color};width:${Math.round(g.cnt/maxGC*100)}%"></div></div>
    </div>
    <div class="grp-cnt">${g.cnt}</div>
  </div>`).join("");
}

function renderHeatmapPage() {
  renderAllHeatmap();
  renderCalendar();
  renderLogList(null); // 기본: 아무 날도 선택 안된 상태

function renderAllHeatmap() {
  const grid = document.getElementById("hm-grid");
  const peak = document.getElementById("hm-peak");
  // 전체 로그 집계 (요일×시간)
  const count = Array.from({length:7}, () => new Array(24).fill(0));
  logs.forEach(l => {
    const d = new Date(l.ts);
    let day = d.getDay(); day = day===0?6:day-1;
    count[day][d.getHours()]++;
  });
  let pv=0,pd=0,ph=0;
  count.forEach((row,d)=>row.forEach((v,h)=>{if(v>pv){pv=v;pd=d;ph=h;}}));
  const total = logs.length;

  let html = "<div class='hm-corner'></div>";
  for(let h=0;h<24;h++) html += h%3===0?`<div class="hm-hour">${pad(h)}h</div>`:"<div class='hm-hour'></div>";
  DAYS.forEach((day,d)=>{
    html += `<div class="hm-day-lbl">${day}</div>`;
    for(let h=0;h<24;h++){
      const v = Math.min(count[d][h], 5);
      // 클릭 기능 없음 - 단순 표시만
      html += `<div class="hm-cell" data-v="${v}" title="${DAYS_KR[d]}요일 ${h}시: ${count[d][h]}회" style="cursor:default"></div>`;
    }
  });
  grid.innerHTML = html;

  if(total>0) {
    const pct = Math.round(pv/total*100);
    peak.innerHTML = `Peak: <b>${DAYS_KR[pd]}요일 ${pad(ph)}h</b> <span class="pk">(${pv} &middot; ${pct}%)</span> &nbsp;&nbsp;&nbsp; <b>${total}</b> total`;
  } else {
    peak.innerHTML = `<span style="color:var(--muted2)">아직 로그가 없습니다</span>`;
  }
}

// ═══════════════════════════════
//  CALENDAR
// ═══════════════════════════════
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let selectedDate = null; // "YYYY-MM-DD"

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar() {
  const lbl = document.getElementById("cal-month-lbl");
  lbl.textContent = `${calYear}.${pad(calMonth+1)}`;

  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // 해당 월 로그를 날짜별로 집계
  const dayCounts = {};
  logs.forEach(l => {
    const d = new Date(l.ts);
    if(d.getFullYear()===calYear && d.getMonth()===calMonth) {
      const key = `${calYear}-${pad(calMonth+1)}-${pad(d.getDate())}`;
      dayCounts[key] = (dayCounts[key]||0) + 1;
    }
  });

  const DOWS = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  let html = DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join("");

  // 빈 칸 (월 시작 전)
  for(let i=0;i<firstDay;i++) html += `<div class="cal-cell empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const dateKey = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const cnt = dayCounts[dateKey]||0;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const isSel = selectedDate===dateKey;
    const dots = Math.min(cnt, 8);
    const dotsHtml = dots>0 ? `<div class="cal-dots">${Array(dots).fill('<span class="cal-dot"></span>').join("")}</div><div class="cal-cnt">${cnt}</div>` : "";
    html += `<div class="cal-cell${isToday?" today":""}${isSel?" selected":""}" onclick="selectCalDate('${dateKey}')">
      <div class="cal-day">${d}</div>
      ${dotsHtml}
    </div>`;
  }

  document.getElementById("cal-grid").innerHTML = html;
}

function selectCalDate(dateKey) {
  selectedDate = dateKey;
  renderCalendar();
  renderLogList(dateKey);
  // 제목 업데이트
  document.getElementById("log-day-title").textContent = dateKey;
}

// ═══════════════════════════════
//  LOG LIST (날짜별)
// ═══════════════════════════════
function renderLogList(dateKey) {
  const ll = document.getElementById("log-list");
  const title = document.getElementById("log-day-title");

  let list;
  if(!dateKey) {
    // 날짜 미선택: 최근 로그 전체
    list = [...logs].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,30);
    title.textContent = "RECENT LOG";
  } else {
    list = logs.filter(l=>{
      const d = new Date(l.ts);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}` === dateKey;
    }).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
    title.textContent = dateKey + " (" + list.length + ")";
  }

  if(!list.length){
    ll.innerHTML=`<div class="no-data" style="padding:16px">NO LOGS</div>`;
    return;
  }
  ll.innerHTML = list.map(log=>{
    const item = items.find(i=>i.id===log.pid);
    const d = new Date(log.ts);
    const ds = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    return `<div class="log-row">
      <span class="log-time">${ds}</span>
      <span class="log-pname">${esc(item?.name||"?")}</span>
      <span class="log-pcat">${item?.cat||""}</span>
      <button class="log-del-btn" onclick="deleteLog('${log.id}','${dateKey||""}')">x</button>
    </div>`;
  }).join("");
}

}

function applyFile(file){
  if(!file||!file.type.startsWith("image/")){showToast("이미지 파일만 가능합니다");return;}
  currentImgFile = file; // 파일 객체 보관

  const p = document.getElementById("preview-img");
  p.src = url; p.style.display = "block";
  showToast("<span class=tp>+</span> 이미지 추가됨");
}

async function uploadImageToStorage(file, itemId) {
  const ext = file.name.split(".").pop() || "jpg";
  const path = `${itemId}.${ext}`;
  const res = await fetch(`${SB_URL}/storage/v1/object/star-photos/${path}`, {
    method: "POST",
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": file.type,
      "x-upsert": "true"
    },
    body: file
  });
  if(!res.ok) throw new Error(await res.text());
  return `${SB_URL}/storage/v1/object/public/star-photos/${path}`;
}

async function deleteImageFromStorage(itemId) {
  // itemId 기준으로 파일 삭제 (확장자 모르니 list 후 삭제)
  try {
    const listRes = await fetch(`${SB_URL}/storage/v1/object/list/star-photos`, {
      method: "POST",
      headers: { ...HEADERS },
      body: JSON.stringify({ prefix: itemId, limit: 5 })
    });
    const files = await listRes.json();
    if(files && files.length) {
      await fetch(`${SB_URL}/storage/v1/object/star-photos`, {
        method: "DELETE",
        headers: { ...HEADERS },
        body: JSON.stringify({ prefixes: files.map(f=>`${itemId}/${f.name}`) })
      });
    }
  } catch(e) { /* 무시 */ }
}

function toggleView() {
  const isMobile = document.body.classList.toggle("mobile-view");
  document.getElementById("view-toggle-btn").textContent = isMobile ? "PC VIEW" : "MOBILE VIEW";
  localStorage.setItem("sc_view", isMobile ? "mobile" : "pc");
}
if(localStorage.getItem("sc_view")==="mobile") {
  document.body.classList.add("mobile-view");
  const btn = document.getElementById("view-toggle-btn");
  if(btn) btn.textContent = "PC VIEW";
}

// Mobile bottom nav
document.querySelectorAll(".mob-nav-btn[data-page]").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".mob-nav-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const pg = t.dataset.page;
    document.getElementById("page-"+pg).classList.add("active");
    document.getElementById("tb-title").innerHTML = TB_TITLES[pg];
    document.querySelector(".search-wrap").style.display = pg==="cards"?"":"none";
    document.querySelector(".topbar-filters").style.display = pg==="cards"?"":"none";
    if(pg==="ranking") renderRanking();
    if(pg==="heatmap") renderHeatmapPage();
  });
});


// ═══════════════════════════════
//  CARD LOG LIST TOGGLE
// ═══════════════════════════════
function toggleCardLogs(pid, e) {
  e && e.stopPropagation();
  const el = document.getElementById("cll-"+pid);
  if(!el) return;
  const isOpen = el.classList.toggle("open");
  if(isOpen) renderCardLogList(pid);
}

function renderCardLogList(pid) {
  const el = document.getElementById("cll-"+pid);
  if(!el) return;
  const pLogs = [...logs].filter(l=>l.pid===pid).sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,15);
  if(!pLogs.length) { el.innerHTML=`<div style="padding:8px 12px;font-size:10px;color:#2a2a2a;font-family:'JetBrains Mono',monospace">NO LOGS</div>`; return; }
  el.innerHTML = pLogs.map(log=>{
    const d = new Date(log.ts);
    const ds = `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    return `<div class="card-log-entry">
      <span class="card-log-time">${ds}</span>
      <button class="card-log-del" onclick="deleteLogFromCard('${log.id}','${pid}',event)">x</button>
    </div>`;
  }).join("");
}

async function deleteLogFromCard(id, pid, e) {
  e && e.stopPropagation();
  setSyncStatus("syncing","DELETING...");
  try {
    await sbDelete("star_logs", id);
    logs = logs.filter(l=>l.id!==id);
    renderCardLogList(pid);
    renderCards();
    setSyncStatus("ok","SYNCED");
    showToast("로그 삭제됨");
  } catch(err) { setSyncStatus("err","ERROR"); showToast("삭제 실패: "+err.message); }
}
